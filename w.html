<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="w.css" />
  </head>
  <body>
    <div class="container">
      <div class="block">
        <div class="city">
          <input
            type="search"
            id="searchcity"
            placeholder="Enter City" /><button>search</button>
        </div>
        <div class="data">
          <div class="others">
            <div class="img">
              <img src="logo.png" />
            </div>
            <div class="info">
              <div class="cityname">[CITY NAME]</div>
              <div class="temp">[TEMPERATURE]</div>
            </div>
          </div>
          <div class="stats">
            <div class="humidity s">
              <h1></h1>
              Humidity
            </div>
            <div class="windspeed s">
              <h1></h1>
              Windspeed
            </div>
            <div class="pressure s">
              <h1></h1>
              Pressure
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="w.js"></script>
  </body>
</html>
